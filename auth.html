<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="./js/middleware/guest.guard.js"></script>
    <title>Login Page</title>
    <link rel="stylesheet" href="./css/main.css" />
  </head>

  <body
    oncontextmenu="return false;"
    ondragstart="return false;"
    ondrop="return false;"
  >
    <header class="header"></header>

    <main class="container">
      <div class="page-divider"></div>
      <div class="breadcrumb">
        <a href="#" class="breadcrumb__item">Home</a>
        <span class="breadcrumb__separator">&#10095;</span>
        <span class="breadcrumb__item breadcrumb__item--active">Login</span>
      </div>

      <div class="auth js-auth-container" data-mode="login">
        <div class="auth__banner">
          <img
            src="./assets/images/main-img.jpg"
            alt="Auth Banner"
            class="auth__image"
          />
        </div>
        <div class="auth__content">
          <div class="auth__header">
            <h1 class="auth__title">Welcome to SHOP.CO</h1>
            <div class="auth__tabs">
              <button
                type="button"
                class="auth__tab auth__tab--active js-auth-tab"
                data-target="login"
              >
                Login
              </button>
              <button
                type="button"
                class="auth__tab js-auth-tab"
                data-target="register"
              >
                Register
              </button>
            </div>
            <p class="auth__description">
              <span data-show="login"
                >If you don't have an account register you can go to
                <a
                  href="#"
                  class="auth__link js-auth-tab"
                  data-target="register"
                  >Register</a
                ></span
              >
              <span data-show="register"
                >Already have an account?
                <a href="#" class="auth__link js-auth-tab" data-target="login"
                  >Login</a
                ></span
              >
            </p>
          </div>

          <form action="" class="auth__form js-auth-form">
            <!-- Name Field (Register Only) -->
            <div class="form-group" data-show="register">
              <label for="name" class="form-label">Name</label>
              <input
                type="text"
                id="name"
                class="form-input"
                placeholder="Enter your name"
              />
            </div>

            <!-- Email Field -->
            <div class="form-group" data-show="login register forget">
              <label for="email" class="form-label">Email</label>
              <input
                type="email"
                id="email"
                class="form-input"
                placeholder="Enter your email"
                required
              />
            </div>

            <!-- OTP Field (OTP Only) -->
            <div class="form-group" data-show="otp">
              <label for="otp" class="form-label">OTP Code</label>
              <input
                type="text"
                id="otp"
                class="form-input"
                placeholder="Enter 6-digit OTP code"
              />
            </div>

            <!-- Phone Field (Register Only) -->
            <div class="form-group" data-show="register">
              <label for="phone" class="form-label">Phone</label>
              <input
                type="tel"
                id="phone"
                class="form-input"
                placeholder="Enter your phone number"
              />
            </div>

            <!-- Password / New Password Field -->
            <div class="form-group" data-show="login register otp">
              <label for="password" class="form-label">
                <span data-show="login register">Password</span>
                <span data-show="otp">New Password</span>
              </label>
              <div class="form-input-wrapper">
                <input
                  type="password"
                  id="password"
                  class="form-input"
                  placeholder="Enter your Password"
                  required
                />
                <button
                  type="button"
                  class="form-input-icon js-toggle-password"
                  aria-label="Toggle password visibility"
                  tabindex="-1"
                >
                  <!-- Eye Icon (Hidden state) -->
                  <img
                    src="./assets/icons/icn-show-pw.svg"
                    alt="Show Password"
                    title="Show Password"
                    class="icon-eye"
                    width="24"
                    height="24"
                  />
                  <!-- Eye Off Icon (Shown state) -->
                  <img
                    src="./assets/icons/icn-hide-pw.svg"
                    alt="Hide Password"
                    title="Hide Password"
                    class="icon-eye-off"
                    width="24"
                    height="24"
                    style="display: none"
                  />
                </button>
              </div>
            </div>

            <!-- Confirm Password Field (Register and OTP) -->
            <div class="form-group" data-show="register otp">
              <label for="confirm-password" class="form-label"
                >Confirm Password</label
              >
              <div class="form-input-wrapper">
                <input
                  type="password"
                  id="confirm-password"
                  class="form-input"
                  placeholder="Confirm your Password"
                />
                <button
                  type="button"
                  class="form-input-icon js-toggle-password"
                  aria-label="Toggle password visibility"
                  tabindex="-1"
                >
                  <!-- Eye Icon (Hidden state) -->
                  <img
                    src="./assets/icons/icn-show-pw.svg"
                    alt="Show Password"
                    title="Show Password"
                    class="icon-eye"
                    width="24"
                    height="24"
                  />
                  <!-- Eye Off Icon (Shown state) -->
                  <img
                    src="./assets/icons/icn-hide-pw.svg"
                    alt="Hide Password"
                    title="Hide Password"
                    class="icon-eye-off"
                    width="24"
                    height="24"
                    style="display: none"
                  />
                </button>
              </div>
            </div>

            <div class="auth__options" data-show="login">
              <div class="form-checkbox">
                <input
                  type="checkbox"
                  id="remember"
                  class="form-checkbox__input"
                />
                <label for="remember" class="form-checkbox__label"
                  >Remember me</label
                >
              </div>
              <a href="#" class="auth__forgot-password js-forgot-password">Forgot Password ?</a>
            </div>

            <button
              type="submit"
              class="btn btn--primary auth__button js-auth-submit"
            >
              <span data-show="login">Login</span>
              <span data-show="register">Register</span>
              <span data-show="forget">Send OTP</span>
              <span data-show="otp">Reset Password</span>
            </button>
          </form>

          <div class="auth__divider">
            <span>or continue with</span>
          </div>

          <div class="auth__social">
            <a href="#" class="auth__social-link">
              <img src="./assets/icons/icn-login-fb.svg" alt="Facebook" />
            </a>
            <a href="#" class="auth__social-link">
              <img src="./assets/icons/icn-login-apple.svg" alt="Apple" />
            </a>
            <a href="#" class="auth__social-link">
              <img src="./assets/icons/icn-login-google.svg" alt="Google" />
            </a>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer"></footer>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
