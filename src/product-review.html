<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Detail Page</title>
  <link rel="stylesheet" href="../build/css/main.css">
</head>

<body>
  <div class="container">
    <nav class="tabs">
      <section class="tabs__item" data-tab="js-details">Product Details</section>
      <section class="tabs__item tabs__item--active" data-tab="js-reviews">Rating & Reviews</section>
      <section class="tabs__item" data-tab="js-faqs">FAQs</section>
    </nav>

    <section class="details js-tab-content tab-content" id="js-details">
      <div class="tab-content__header">
        <h2 class="tab-content__title">
          Product Details
        </h2>
      </div>
    </section>

    <section class="reviews js-tab-content tab-content" id="js-reviews">
      <header class="tab-content__header">
        <h2 class="tab-content__title">
          All Reviews <span class="reviews__count">(120)</span>
        </h2>
        <div class="reviews__actions">
          <button class="btn btn--filter" id="js-btn-filter">
            <div class="btn--filter__menu"></div>
          </button>
          <div class="select-dropdown">Latest</div>
          <button class="btn btn--write-review">Write a Review</button>
        </div>
      </header>

      <div class="reviews__grid" id="js-reviews-grid">
      </div>
      <button class="btn btn--load-more">Load More Reviews</button>
    </section>

    <section class="faqs js-tab-content tab-content" id="js-faqs">
      <div class="tab-content__header">
        <h2 class="tab-content__title">
          Frequently Asked Questions
        </h2>
      </div>
    </section>

    <section class="related-products">
      <h2 class="related-products__title">YOU MIGHT ALSO LIKE</h2>
      <div class="related-products__list" id="js-related-products">
      </div>
    </section>
  </div>
  <script src="js/product-review.js"></script>

</body>

</html>
