<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Page</title>
  </head>
  <body>
    <header>
      <div class="header__notification"></div>
      <nav class="header__nav">
        <div class="header__logo"></div>
        <div class="header__tab header__tab--shop"></div>
        <div class="header__tab header__tab--on-sale"></div>
        <div class="header__tab header__tab--new-arrivals"></div>
        <div class="header__tab header__tab--brands"></div>
        <div class="header__search"></div>
        <div class="header__cart"></div>
        <div class="header__user"></div>
      </nav>
      <div class="header__breadcrumb">
        <div class="header__breadcrumb__item"></div>
      </div>
    </header>
    <main>
      <div class="product-page">
        <div class="product-collections">
          <div class="product-collections__item"></div>
        </div>
        <div class="product-page__image"></div>
        <div class="product-page__info">
          <div class="product-card">
            <div class="product-card__name-wrapper">
              <h3 class="product-card__name"></h3>
              <h3 class="product-card__name-full"></h3>
            </div>
            <div class="product-card__rating">
              <div class="rating"></div>
              <p></p>
            </div>
            <div class="product-card__price">
              <span class="product-card__price--current"></span>
              <span class="product-card__price--old"></span>
              <span class="product-card__price--discount"></span>
            </div>
            <div class="product-card__description"></div>
            <div class="product-card__color"></div>
            <div class="product-card__size"></div>
            <div class="product-card__quantity-wrapper">
              <div class="product-card__quantity"></div>
              <div class="product-card__quantity-actions"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
